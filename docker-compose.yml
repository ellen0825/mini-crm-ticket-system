services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-crm-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor        # keep container vendor intact
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: crm
      DB_USERNAME: crm
      DB_PASSWORD: secret
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm

  db:
    image: mysql:8.0
    container_name: mini-crm-db
    environment:
      MYSQL_DATABASE: crm
      MYSQL_USER: crm
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "crm", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm

volumes:
  db_data:

networks:
  crm:
    driver: bridge
